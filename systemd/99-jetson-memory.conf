# Sysctl tuning for Jetson Orin — keep SSH alive under memory pressure
# Install: sudo cp 99-jetson-memory.conf /etc/sysctl.d/
#          sudo sysctl --system

# Reserve 256MB for kernel + SSH allocations.
# Default is ~4MB which is way too low — the kernel can't service
# SSH connections when every page is being fought over.
vm.min_free_kbytes = 262144

# Don't let dirty pages consume too much RAM before flushing.
# On 7.4GB, 10% = 740MB of dirty pages = potential OOM source.
vm.dirty_ratio = 5
vm.dirty_background_ratio = 2

# Slightly prefer killing processes over thrashing to death.
# (1 = always OOM kill rather than thrash; default is 0)
vm.oom_kill_allocating_task = 1
