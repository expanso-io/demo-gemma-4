# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Gemma 4 × Expanso Edge — "See, Think, Ship" Vision Pipeline
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Captures webcam frames, sends them to a local Gemma 4 vision
# model, transforms the output into structured schematized data,
# and fans it out to multiple destinations.
#
# Usage:
#   ./run.sh                      # detect objects (default)
#   ./run.sh detect_shapes        # detect geometric shapes
#   ./run.sh read_text            # OCR / handwriting
#   ./run.sh safety_check         # safety monitoring
#   ./run.sh describe_scene       # scene description
#
# Configuration (environment variables):
#   CAPTURE_INTERVAL  Frame capture interval    (default: 5s)
#   INFERENCE_URL     Ollama/llama.cpp server   (default: http://localhost:11434)
#   GEMMA_MODEL       Model name                (default: gemma4-fast)
#   VISION_PROMPT     The prompt sent to Gemma 4 (loaded from prompts/ by run.sh)
#   DETECTION_MODE    Label for output records   (default: detect_objects)
#   NODE_ID           Edge node identifier       (default: edge-cam-001)
#   PIPELINE_VERSION  Version tag for output     (default: 1.0.0)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── Input: Generate a trigger every N seconds ──────────────────
input:
  generate:
    mapping: 'root = ""'
    interval: "${CAPTURE_INTERVAL:5s}"

# ── Pipeline: Capture → Infer → Structure ─────────────────────
pipeline:
  processors:

    # ┌─────────────────────────────────────────────────────────┐
    # │ Step 1: Capture a frame from the webcam                 │
    # │                                                         │
    # │ The subprocess stays alive between captures — the       │
    # │ camera opens once, and each trigger produces one frame. │
    # │ Output: {"image_base64": "/9j/4AAQ..."}                 │
    # └─────────────────────────────────────────────────────────┘
    - subprocess:
        name: python3
        args: ["-u", "capture_frame.py"]
        max_buffer: 1048576  # 1 MB — enough for 320×240 JPEG base64

    - mapping: |
        root = content().string().parse_json()

    # ┌─────────────────────────────────────────────────────────┐
    # │ Step 2: Send frame to Gemma 4 for vision inference      │
    # │                                                         │
    # │ Uses a branch processor to:                             │
    # │   1. Build an OpenAI-compatible request (request_map)   │
    # │   2. POST to the local inference server (http)          │
    # │   3. Extract the response (result_map)                  │
    # │                                                         │
    # │ The model runs locally via Ollama — no cloud needed.    │
    # └─────────────────────────────────────────────────────────┘
    - mutation: |
        meta inference_start = timestamp_unix_milli()

    - branch:
        request_map: |
          let prompt = env("VISION_PROMPT").or("Detect all objects visible in this image. Return ONLY a JSON array: [{\"label\": \"name\", \"confidence\": 0.0-1.0, \"box_2d\": [y1, x1, y2, x2]}]")

          root = {
            "model": env("GEMMA_MODEL").or("gemma4-fast"),
            "messages": [
              {
                "role": "user",
                "content": [
                  {
                    "type": "text",
                    "text": $prompt
                  },
                  {
                    "type": "image_url",
                    "image_url": {
                      "url": "data:image/jpeg;base64," + this.image_base64
                    }
                  }
                ]
              }
            ],
            "temperature": 0.1,
            "max_tokens": 512,
            "stream": false
          }
        processors:
          - http:
              url: "${INFERENCE_URL:http://localhost:11434}/v1/chat/completions"
              verb: POST
              headers:
                Content-Type: application/json
              timeout: 30s
              retries: 1
        result_map: |
          root.inference_response = this.choices.0.message.content
          root.tokens_used = this.usage

    # ┌─────────────────────────────────────────────────────────┐
    # │ Step 3: Transform into structured, schematized output   │
    # │                                                         │
    # │ THIS IS THE EXPANSO VALUE PROP.                         │
    # │                                                         │
    # │ Raw model output goes in. What comes out is:            │
    # │   • Timestamped, versioned, node-tagged                 │
    # │   • Derived analytics (counts, flags, labels)           │
    # │   • Mode-specific conditional fields                    │
    # │   • SHA-256 integrity hashes                            │
    # │   • Image data stripped (data minimization)             │
    # │                                                         │
    # │ This is the difference between an AI demo               │
    # │ and a production data pipeline.                         │
    # └─────────────────────────────────────────────────────────┘
    - mapping: |
        # ── Parse model response (with graceful error handling) ──
        let raw = this.inference_response
        let parsed = $raw.parse_json().catch(null)
        let mode = env("DETECTION_MODE").or("detect_objects")

        # ━━ ENVELOPE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        # Stable across ALL modes. Downstream systems can always
        # count on these fields existing.
        root.timestamp = now().ts_format("2006-01-02T15:04:05.000Z07:00")
        root.node_id = env("NODE_ID").or("edge-cam-001")
        root.pipeline_version = env("PIPELINE_VERSION").or("1.0.0")
        root.model = env("GEMMA_MODEL").or("gemma4-fast")
        root.frame_id = uuid_v4()
        root.mode = $mode

        # ━━ INFERENCE TIMING ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        root.processing_ms = timestamp_unix_milli() - metadata("inference_start")

        # ━━ PAYLOAD ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        # Parse model JSON or wrap raw text so downstream never breaks.
        root.payload = if $parsed != null { $parsed } else { {"raw": $raw} }

        # ━━ DERIVED ANALYTICS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        # Computed BY the pipeline, not by the model.
        # This is what you can't get from `curl localhost:11434`.

        # Object/detection count — works for any array-returning mode
        root.object_count = $raw.parse_json().length().catch(0)
        root.has_detections = root.object_count > 0

        # ━━ MODE-SPECIFIC FIELDS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        # Bloblang conditionals: different modes produce different
        # output schemas. Same pipeline, different shapes.

        # detect_objects / detect_shapes → extract just the labels
        root.labels = if ($mode == "detect_objects" || $mode == "detect_shapes") && $parsed != null {
          $parsed.map_each(item -> item.label.or(item.shape).or("unknown")).catch([])
        } else { deleted() }

        # safety_check → promote risk fields + compute alert flag
        root.risk_level = if $mode == "safety_check" && $parsed != null {
          $parsed.risk_level.or(0)
        } else { deleted() }

        root.safe = if $mode == "safety_check" && $parsed != null {
          $parsed.safe.or(true)
        } else { deleted() }

        root.alert = if $mode == "safety_check" && $parsed != null {
          $parsed.risk_level.or(0) > 3
        } else { deleted() }

        # read_text → promote the extracted text to top level
        root.extracted_text = if $mode == "read_text" && $parsed != null {
          $parsed.text.or("")
        } else { deleted() }

        # ━━ DATA INTEGRITY ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        # SHA-256 hashes for both input frame and model output.
        # Downstream can verify nothing was tampered with.
        root.integrity = {
          "payload_sha256": $raw.hash("sha256").encode("hex"),
          "frame_sha256": this.image_base64.hash("sha256").encode("hex")
        }

        # ━━ TOKEN USAGE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        root.tokens = this.tokens_used

        # NOTE: image_base64 is deliberately NOT copied to root.
        # The raw frame never reaches downstream — data minimization.

    # ┌─────────────────────────────────────────────────────────┐
    # │ Step 4: Makoto L1 Data Provenance Attestation           │
    # │                                                         │
    # │ Every detection carries a Makoto attestation proving:   │
    # │   • Where the data came from (camera + node ID)         │
    # │   • What transform was applied (model + prompt mode)    │
    # │   • Who executed it (this Expanso Edge node)            │
    # │   • Integrity hashes for verification                   │
    # │                                                         │
    # │ Spec: https://usemakoto.dev/spec/                       │
    # │ This is SLSA for data. No other AI demo does this.      │
    # └─────────────────────────────────────────────────────────┘
    - mutation: |
        root.attestation = {
          "_type": "https://in-toto.io/Statement/v1",
          "subject": [{
            "name": "detection:" + this.frame_id,
            "digest": {
              "sha256": this.integrity.payload_sha256,
              "recordCount": "1"
            }
          }],
          "predicateType": "https://makoto.dev/transform/v1",
          "predicate": {
            "inputs": [{
              "name": "webcam-frame:" + this.frame_id,
              "digest": {
                "sha256": this.integrity.frame_sha256
              }
            }],
            "transform": {
              "type": "https://makoto.dev/transforms/vision-inference",
              "name": this.mode,
              "version": this.pipeline_version,
              "parameters": {
                "model": this.model,                "prompt_mode": this.mode,
                "temperature": 0.1,
                "max_tokens": 512
              },
              "codeRef": {
                "uri": "https://github.com/expanso-io/demo-gemma-4",
                "pipeline": "pipeline.yaml"
              }
            },
            "executor": {
              "id": "expanso-edge://" + this.node_id,
              "platform": "expanso-edge"
            },
            "metadata": {
              "processedOn": this.timestamp,
              "processingMs": this.processing_ms
            }
          }
        }

# ── Output: Fan out to multiple destinations ───────────────────
#
# Same detection → terminal + archive. Add Kafka, S3, PostgreSQL,
# Datadog, or any of Expanso's 69+ output components in seconds.
#
output:
  broker:
    pattern: fan_out
    outputs:
      # 1. Real-time terminal display
      - stdout:
          codec: lines

      # 2. Structured JSONL archive (one file per day)
      - file:
          path: './detections/${! now().ts_format("2006-01-02") }.jsonl'
          codec: lines

      # 3. Live dashboard (web/server.py on port 9090)
      - try:
          - http_client:
              url: "${DASHBOARD_URL:http://localhost:9090}/api/detection"
              verb: POST
              headers:
                Content-Type: application/json
              retries: 0
          - drop: {}

      # ── Uncomment to add more destinations ──────────────
      #
      # # 4. Forward to any HTTP API (webhook, Slack, PagerDuty)
      # - http_client:
      #     url: https://your-api.com/detections
      #     verb: POST
      #     headers:
      #       Content-Type: application/json
      #
      # # 4. Stream to Kafka
      # - kafka:
      #     addresses: ["localhost:9092"]
      #     topic: vision-detections
      #
      # # 5. Archive to S3
      # - aws_s3:
      #     bucket: my-detections-bucket
      #     path: 'edge/${! env("NODE_ID") }/${! now().ts_format("2006-01-02") }/${! uuid_v4() }.json'
