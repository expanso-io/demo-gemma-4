# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Gemma 4 × Expanso Edge — "Sees, Reads, Thinks" Multi-Modal Demo
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# One frame → four Gemma 4 analyses:
#   1. DETECT  — object classification (CSV labels)
#   2. READ    — OCR / text extraction
#   3. DESCRIBE — scene summary (one sentence)
#   4. SAFETY  — hazard judgment (safe/alert)
#
# Each analysis runs sequentially against the same captured frame.
# Total cycle: ~8-10s on Jetson Orin 8GB.
#
# Configuration (environment variables):
#   CAPTURE_INTERVAL  Frame capture interval    (default: 12s)
#   INFERENCE_URL     llama.cpp server          (default: http://localhost:8081)
#   NODE_ID           Edge node identifier       (default: edge-cam-001)
#   PIPELINE_VERSION  Version tag for output     (default: 2.0.0)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── Input: trigger every N seconds ─────────────────────────────
input:
  generate:
    mapping: 'root = ""'
    interval: "${CAPTURE_INTERVAL:12s}"

# ── Pipeline: Capture → 4× Infer → Structure ──────────────────
pipeline:
  processors:

    # ┌─────────────────────────────────────────────────────────┐
    # │ Step 1: Capture a frame from the webcam                 │
    # └─────────────────────────────────────────────────────────┘
    - subprocess:
        name: python3
        args: ["-u", "capture_frame.py"]
        max_buffer: 1048576

    - mapping: |
        root = content().string().parse_json()

    - mapping: |
        root = if this.exists("image_base64") { this } else { deleted() }

    # ┌─────────────────────────────────────────────────────────┐
    # │ Step 2a: DETECT — Object classification                 │
    # │ "What's in the frame?" → CSV labels                     │
    # └─────────────────────────────────────────────────────────┘
    - mutation: |
        meta detect_start = timestamp_unix_milli()

    - branch:
        request_map: |
          root = {
            "model": "gemma4",
            "messages": [
              {
                "role": "user",
                "content": [
                  {"type": "text", "text": "Which are visible? person, box, bottle, sign. CSV only, no explanation."},
                  {"type": "image_url", "image_url": {"url": "data:image/jpeg;base64," + this.image_base64}}
                ]
              }
            ],
            "max_tokens": 16,
            "temperature": 0.1
          }
        processors:
          - http:
              url: "${INFERENCE_URL:http://localhost:8081}/v1/chat/completions"
              verb: POST
              headers:
                Content-Type: application/json
              timeout: 30s
              retries: 1
        result_map: |
          root.detect = {
            "raw": this.choices.index(0).message.content,
            "ms": timestamp_unix_milli() - metadata("detect_start"),
            "tokens": this.usage.total_tokens.or(0)
          }

    # ┌─────────────────────────────────────────────────────────┐
    # │ Step 2b: READ — OCR / text extraction                   │
    # │ "What does it say?" → comma-separated text strings      │
    # │ This is what YOLO cannot do.                             │
    # └─────────────────────────────────────────────────────────┘
    - mutation: |
        meta read_start = timestamp_unix_milli()

    - branch:
        request_map: |
          root = {
            "model": "gemma4",
            "messages": [
              {
                "role": "user",
                "content": [
                  {"type": "text", "text": "Read all text visible in this image. Return only the text strings, comma-separated. Nothing else."},
                  {"type": "image_url", "image_url": {"url": "data:image/jpeg;base64," + this.image_base64}}
                ]
              }
            ],
            "max_tokens": 24,
            "temperature": 0.1
          }
        processors:
          - http:
              url: "${INFERENCE_URL:http://localhost:8081}/v1/chat/completions"
              verb: POST
              headers:
                Content-Type: application/json
              timeout: 30s
              retries: 1
        result_map: |
          root.read_text = {
            "raw": this.choices.index(0).message.content,
            "ms": timestamp_unix_milli() - metadata("read_start"),
            "tokens": this.usage.total_tokens.or(0)
          }

    # ┌─────────────────────────────────────────────────────────┐
    # │ Step 2c: DESCRIBE — Scene understanding                 │
    # │ "What's happening?" → one-sentence summary              │
    # │ This is what YOLO cannot do.                             │
    # └─────────────────────────────────────────────────────────┘
    - mutation: |
        meta describe_start = timestamp_unix_milli()

    - branch:
        request_map: |
          root = {
            "model": "gemma4",
            "messages": [
              {
                "role": "user",
                "content": [
                  {"type": "text", "text": "Describe this scene in one sentence, 15 words max."},
                  {"type": "image_url", "image_url": {"url": "data:image/jpeg;base64," + this.image_base64}}
                ]
              }
            ],
            "max_tokens": 32,
            "temperature": 0.1
          }
        processors:
          - http:
              url: "${INFERENCE_URL:http://localhost:8081}/v1/chat/completions"
              verb: POST
              headers:
                Content-Type: application/json
              timeout: 30s
              retries: 1
        result_map: |
          root.describe = {
            "raw": this.choices.index(0).message.content,
            "ms": timestamp_unix_milli() - metadata("describe_start"),
            "tokens": this.usage.total_tokens.or(0)
          }

    # ┌─────────────────────────────────────────────────────────┐
    # │ Step 2d: SAFETY — Hazard judgment                       │
    # │ "Is this safe?" → safe / alert with reason              │
    # │ This is what YOLO cannot do.                             │
    # └─────────────────────────────────────────────────────────┘
    - mutation: |
        meta safety_start = timestamp_unix_milli()

    - branch:
        request_map: |
          root = {
            "model": "gemma4",
            "messages": [
              {
                "role": "user",
                "content": [
                  {"type": "text", "text": "Is this scene safe? Reply: safe OR alert: [reason]. Nothing else."},
                  {"type": "image_url", "image_url": {"url": "data:image/jpeg;base64," + this.image_base64}}
                ]
              }
            ],
            "max_tokens": 16,
            "temperature": 0.1
          }
        processors:
          - http:
              url: "${INFERENCE_URL:http://localhost:8081}/v1/chat/completions"
              verb: POST
              headers:
                Content-Type: application/json
              timeout: 30s
              retries: 1
        result_map: |
          root.safety = {
            "raw": this.choices.index(0).message.content,
            "ms": timestamp_unix_milli() - metadata("safety_start"),
            "tokens": this.usage.total_tokens.or(0)
          }

    # ┌─────────────────────────────────────────────────────────┐
    # │ Step 3: Assemble structured multi-modal output          │
    # └─────────────────────────────────────────────────────────┘
    - mapping: |
        # Parse detect labels
        let detect_raw = this.detect.raw.trim()
        let detect_labels = $detect_raw.re_replace_all("[\\n\\r]", ",").split(",").map_each(l -> l.trim().lowercase()).filter(l -> l.length() > 0)

        # Parse read text
        let read_raw = this.read_text.raw.trim()

        # Parse describe
        let describe_raw = this.describe.raw.trim()

        # Parse safety
        let safety_raw = this.safety.raw.trim()
        let is_safe = !$safety_raw.lowercase().contains("alert")

        # ━━ ENVELOPE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        root.timestamp = now().ts_format("2006-01-02T15:04:05.000Z07:00")
        root.node_id = env("NODE_ID").or("edge-cam-001")
        root.pipeline_version = env("PIPELINE_VERSION").or("2.0.0")
        root.model = "gemma4-e2b-q4"
        root.frame_id = uuid_v4()
        root.mode = "multi"

        # ━━ FOUR ANALYSES ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        root.detect = {
          "labels": $detect_labels,
          "count": $detect_labels.length(),
          "ms": this.detect.ms,
          "tokens": this.detect.tokens
        }

        root.read_text = {
          "text": $read_raw,
          "ms": this.read_text.ms,
          "tokens": this.read_text.tokens
        }

        root.describe = {
          "summary": $describe_raw,
          "ms": this.describe.ms,
          "tokens": this.describe.tokens
        }

        root.safety = {
          "safe": $is_safe,
          "risk": if $is_safe { 1 } else { 3 },
          "detail": $safety_raw,
          "ms": this.safety.ms,
          "tokens": this.safety.tokens
        }

        # ━━ TOTALS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        root.total_ms = this.detect.ms + this.read_text.ms + this.describe.ms + this.safety.ms
        root.total_tokens = this.detect.tokens + this.read_text.tokens + this.describe.tokens + this.safety.tokens

        # ━━ DATA INTEGRITY ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        root.integrity = {
          "frame_sha256": this.image_base64.hash("sha256").encode("hex")
        }

    # ┌─────────────────────────────────────────────────────────┐
    # │ Step 4: Makoto L1 Data Provenance Attestation           │
    # └─────────────────────────────────────────────────────────┘
    - mutation: |
        root.attestation = {
          "_type": "https://in-toto.io/Statement/v1",
          "subject": [{
            "name": "multimodal:" + this.frame_id,
            "digest": {
              "sha256": this.integrity.frame_sha256,
              "recordCount": "4"
            }
          }],
          "predicateType": "https://makoto.dev/transform/v1",
          "predicate": {
            "inputs": [{
              "name": "webcam-frame:" + this.frame_id,
              "digest": { "sha256": this.integrity.frame_sha256 }
            }],
            "transform": {
              "type": "https://makoto.dev/transforms/vision-inference",
              "name": "multi-modal",
              "version": this.pipeline_version,
              "parameters": {
                "model": this.model,
                "modes": ["detect", "read_text", "describe", "safety"],
                "temperature": 0.1
              },
              "codeRef": {
                "uri": "https://github.com/expanso-io/demo-gemma-4",
                "pipeline": "pipeline.yaml"
              }
            },
            "executor": {
              "id": "expanso-edge://" + this.node_id,
              "platform": "expanso-edge"
            },
            "metadata": {
              "processedOn": this.timestamp,
              "processingMs": this.total_ms
            }
          }
        }

# ── Output: Fan out to multiple destinations ───────────────────
output:
  broker:
    pattern: fan_out
    outputs:
      - stdout:
          codec: lines

      - file:
          path: './detections/${! now().ts_format("2006-01-02") }.jsonl'
          codec: lines

      - drop_on:
          error: true
          output:
            http_client:
              url: "${DASHBOARD_URL:http://localhost:9090}/api/detection"
              verb: POST
              headers:
                Content-Type: application/json
              retries: 0
              max_in_flight: 1
